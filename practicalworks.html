<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
  <script src="js/i18n.js" defer></script>
  <script src="js/dark-mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <title>Anka Hilbert - Scenic Artist</title>
</head>

<body>
  <header></header>

  <main id="main">
    <article class="gallery-text-subpage">
      <h1 data-i18n="practical_works_title"></h1>
      <p data-i18n="practical_works_intro"></p>
    </article>

    <ul id="gallery">
      <li>
        <img src="images/small/practical-works/goldimitation.webp" srcset="images/small/practical-works/goldimitation-400.webp 400w,
          images/small/practical-works/goldimitation-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/goldimitation.webp"
          alt="Theatrical gold imitation painting, ornamental face with chipped surface" width="800" height="800" />
      </li>

      <li>
        <img src="images/small/practical-works/degas-ballerina.webp" srcset="images/small/practical-works/degas-ballerina-400.webp 400w,
          images/small/practical-works/degas-ballerina-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/degas-ballerina.webp"
          alt="Theatrical painting of Degas' ballerina against a silk wallpaper background" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/graphic-Horst-Janssen.webp" srcset="images/small/practical-works/graphic-Horst-Janssen-400.webp 400w,
          images/small/practical-works/graphic-Horst-Janssen-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/graphic-Horst-Janssen.webp"
          alt="Theatrical painting after Horst Janssen's etching 'Selbst als Angler'" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/landscape.webp" srcset="images/small/practical-works/landscape-400.webp 400w,
          images/small/practical-works/landscape-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/landscape.webp"
          alt="Theatrical painting of a landscape with trees, a pond and a small jetty" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/venice-architecture.webp" srcset="images/small/practical-works/venice-architecture-400.webp 400w,
          images/small/practical-works/venice-architecture-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/venice-architecture.webp"
          alt="Black and white theatrical painting of Venetian architecture with a row of buildings, a boat and water"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/fresco.webp" srcset="images/small/practical-works/fresco-400.webp 400w,
          images/small/practical-works/fresco-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/fresco.webp"
          alt="Theatrical painting of a weathered fresco depicting an angel playing a lute" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/scrim.webp" srcset="images/small/practical-works/scrim-400.webp 400w,
          images/small/practical-works/scrim-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/scrim.webp"
          alt="Theatrical painting of an Indian railway platform at sunset with figures, one reading a newspaper, another carrying luggage on their head"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/capital.webp" srcset="images/small/practical-works/capital-400.webp 400w,
          images/small/practical-works/capital-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/capital.webp"
          alt="Theatrical painting of a Corinthian capital in stone tones against a muted background" width="800"
          height="800" />
      </li>
      <li>
        <img src="images/small/practical-works/rust.webp" srcset="images/small/practical-works/rust-400.webp 400w,
          images/small/practical-works/rust-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/practical-works/rust.webp"
          alt="Theatrical painting of a rusty gear and chain in green and reddish tones with peeling paint" width="800"
          height="800" />
      </li>
    </ul>

    <dialog id="lightbox">
      <button class="lightbox-close">✕</button>
      <button class="lightbox-prev">‹</button>
      <button class="lightbox-next">›</button>
      <figure>
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-credit"></figcaption>
      </figure>
    </dialog>
  </main>

  <footer></footer>
</body>

</html>
