<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main>
      <h1 id="practical_works_title"></h1>
      <p id="practical_works_intro"></p>
    </main>

    <ul id="gallery">
      <li>
        <img src="images/goldimitation.webp" alt="Theatrical gold imitation painting, ornamental face with chipped surface" class="focus-right" />
      </li>
      <li>
        <img src="images/degas-ballerina.webp" alt="Theatrical painting of Degas' ballerina against a silk wallpaper background" class="focus-top" />
      </li>
      <li>
        <img
          src="images/graphic-Horst-Janssen.webp"
          alt="Theatrical painting after Horst Janssen's etching 'Selbst als Angler'"
          class="focus-right"
        />
      </li>
      <li><img src="images/landscape.webp" alt="Theatrical painting of a landscape with trees, a pond and a small jetty" class="focus-left" /></li>
      <li><img src="images/venice-architecture.webp" alt="Black and white theatrical painting of Venetian architecture with a row of buildings, a boat and water" /></li>
      <li><img src="images/fresco.webp" alt="Theatrical painting of a weathered fresco depicting an angel playing a lute" /></li>
      <li><img src="images/scrim.webp" alt="Theatrical painting of an Indian railway platform at sunset with figures, one reading a newspaper, another carrying luggage on their head" class="focus-right" /></li>
      <li><img src="images/capital.webp" alt="Theatrical painting of a Corinthian capital in stone tones against a muted background" class="focus-top" /></li>
      <li><img src="images/rust.webp" alt="Theatrical painting of a rusty gear and chain in green and reddish tones with peeling paint" class="focus-left" /></li>
    </ul>

    <dialog id="lightbox">
      <button class="lightbox-close">✕</button>
      <button class="lightbox-prev">‹</button>
      <button class="lightbox-next">›</button>
      <img id="lightbox-img" src="" alt="" />
    </dialog>

    <footer></footer>
  </body>
</html>
