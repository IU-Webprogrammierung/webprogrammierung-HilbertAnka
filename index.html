<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main id="main">
      <section class="hero">
        <article class="hero-text">
          <h1 id="index_title"></h1>
          <p id="welcome_text"></p>
        </article>

        <figure class="hero-img-1">
          <img
            src="images/large/other/pigments.webp"
            alt="torage shelves containing a wide variety of coloured pigments for theatrical scenic painting."
            width="800"
            height="800"
          />
        </figure>
      </section>

      <section class="hero-2">
        <figure class="hero-img-2">
          <img
            src="images/large/other/jungle.webp"
            alt="S"
            width="800"
            height="800"
          />
        </figure>

        <article class="hero-text-2">
          <h2 id="index_title2"></h2>
          <p id="index_intro1"></p>
        </article>
      </section>

      <section class="gallery">
        <a id="gallery_title" href="gallery.html"></a>
      </section>

      <section class="context">
        <article class="context-text">
          <h2 id="index_title3"></h2>
          <p id="index_intro2"></p>
        </article>
      </section>

      <section class="video">
        <button class="video-thumbnail" id="video-open" aria-label="Play video">
          <figure class="organic-video">
            <img
              src="https://img.youtube.com/vi/8BNDVy-Xemw/maxresdefault.jpg"
              alt="Behind-the-scenes preview image of stage set production for the ballet Sleeping Beauty"
            />
          </figure>
        </button>

        <p id="video-description"></p>
      </section>

      <dialog id="video-lightbox">
        <button class="video-close" aria-label="Close video">✕</button>
        <iframe
          id="video-iframe"
          src=""
          title="Behind-the-scenes preview image of stage set production for the ballet Sleeping Beauty"
          allowfullscreen
          width="900"
          height="500"
        ></iframe>
      </dialog>

      <section class="subnav">
        <ul>
          <li>
            <figure class="organic-img-3">
              <img
                src="images/large/other/brushes.webp"
                alt="Paint brushes lying on the paint-covered floor of a theatre paint studio."
                width="400"
                height="400"
              />
            </figure>
            <a id="studio_insights_title" href="studioinsights.html"></a>
          </li>
          <li>
            <figure class="organic-img-4">
              <img
                src="images/large/other/fromabove.webp"
                alt="Top view of a paint mixing trolley with various paint pots and water containers in a theatre paint studio."
                width="400"
                height="400"
              />
            </figure>
            <a id="about_me_title" href="aboutme.html"></a>
          </li>
          <li>
            <figure class="organic-img-5">
              <img
                src="images/large/other/color.webp"
                alt="Close-up of mixed paint on a scenic painter’s palette surface."
                width="400"
                height="400"
              />
            </figure>
            <a id="contact_title" href="contact.html"></a>
          </li>
        </ul>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
