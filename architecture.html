<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />

    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main id="main">
      <article class="gallery-text-subpage">
        <h1 id="architecture_title_1"></h1>
        <p id="architecture_intro"></p>
      </article>

      <ul id="gallery">
        <li>
          <img
            src="images/small/practical-works/venice-architecture.webp"
            data-large="images/large/practical-works/venice-architecture.webp"
            alt="Black and white theatrical painting of Venetian architecture with a row of buildings, a boat and water"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/wunschpunsch1.webp"
            data-large="images/large/architecture/wunschpunsch1.webp"
            alt="Church facade set piece, featuring two Gothic windows with smaller panes and rose window details"
            width="800"
            height="800"
          />
        </li>

        <li>
          <figure class="credited-img">
            <img
              src="images/small/architecture/wunschpunsch.webp"
              data-large="images/large/architecture/wunschpunsch.webp"
              data-credit="© Lutz Edelhoff"
              alt="Performance shot of two figures in raven and cat costumes in front of a Gothic church facade set"
              width="800"
              height="800"
            />
            <figcaption>© Lutz Edelhoff</figcaption>
          </figure>
        </li>

        <li>
          <img
            src="images/small/architecture/sleeping-beauty1.webp"
            data-large="images/large/architecture/sleeping-beauty1.webp"
            alt="Backdrop depicting a grand palace interior with columns, ornaments, gold and marble details, opening to a sky in the background"
            width="800"
            height="800"
          />
        </li>

        <li>
          <figure class="credited-img">
            <img
              src="images/small/architecture/sleeping-beauty.webp"
              data-large="images/large/architecture/sleeping-beauty.webp"
              data-credit="© Lutz Edelhoff"
              alt="Performance shot of Sleeping Beauty, ballet dancers in front of the palace set, scene 3"
              width="800"
              height="800"
            />
            <figcaption>© Lutz Edelhoff</figcaption>
          </figure>
        </li>

        <li>
          <img
            src="images/small/architecture/sleeping-beauty2.webp"
            data-large="images/large/architecture/sleeping-beauty2.webp"
            alt="Backdrop depicting a grand palace interior photographed from above in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/graduation-project/diploma.webp"
            data-large="images/large/graduation-project/diploma.webp"
            alt="Theatrical painting of a view from the stage into an abandoned ornate theater, framed by curtains"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/serail.webp"
            data-large="images/large/architecture/serail.webp"
            alt="Backdrop depicting an abandoned industrial interior with steel beams, crumbling plaster and broken railings across multiple levels"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/cabaret.webp"
            data-large="images/large/architecture/cabaret.webp"
            alt="Scenic backdrop depicting a black and white storage room in perspective, with rolling mesh cages and shelves stacked with chairs in the background"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/eleni.webp"
            data-large="images/large/architecture/eleni.webp"
            alt="Two drops depicting a large building facade with many windows, photographed in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/eleni1.webp"
            data-large="images/large/architecture/eleni1.webp"
            alt="Scenic artist painting a building facade drop, photographed from a ladder above"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/eleni2.webp"
            data-large="images/large/architecture/eleni2.webp"
            alt="Building facade drop photographed from the wings, with stage lighting equipment visible on the side"
            width="800"
            height="800"
          />
        </li>
      </ul>

      <dialog id="lightbox">
        <button class="lightbox-close">✕</button>
        <button class="lightbox-prev">‹</button>
        <button class="lightbox-next">›</button>
        <figure>
          <img id="lightbox-img" src="" alt="" />
          <figcaption id="lightbox-credit"></figcaption>
        </figure>
      </dialog>
    </main>

    <footer></footer>

    <script src="js/main.js"></script>
    <script src="js/i18n.js"></script>
  </body>
</html>
