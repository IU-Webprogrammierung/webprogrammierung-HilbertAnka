<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main>
      <article class="studio-insights-intro">
        <h1 id="studio_insights_title"></h1>
        <p id="studio_insights_intro"></p>
      </article>

      <section class="studio-insights">
        <ul id="studio-insights-gallery">
          <li class="insights-item">
            <article>
              <h2 id="process_preparation_title"></h2>
              <p id="process_preparation_text"></p>
            </article>
            <img
              src="images/small/studio-insights/preparation.webp"
              data-large="images/large/studio-insights/preparation.webp"
              alt="Empty primed drop stretched on the studio floor, lit from the side"
              width="800"
              height="800"
            />
          </li>

          <li class="insights-item text-first">
            <img
              src="images/small/studio-insights/sleeping-beauty-sketch.webp"
              data-large="images/large/studio-insights/sleeping-beauty-sketch.webp"
              alt="Palace backdrop in early sketch stage, grid transfer visible, photographed from above in the studio"
              width="800"
              height="800"
            />

            <article>
              <h2 id="sketch_transfer_title"></h2>
              <p id="sketch_transfer_text"></p>
            </article>
          </li>

          <li class="insights-item">
            <article>
              <h2 id="inking_title"></h2>
              <p id="inking_text"></p>
            </article>
            <img
              src="images/small/studio-insights/inking.webp"
              data-large="images/large/studio-insights/inking.webp"
              alt="Side wing elements freshly inked, with some areas of color already applied, photographed from above in the studio"
              width="800"
              height="800"
            />
          </li>

          <li class="insights-item text-first">
            <img
              src="images/small/sleeping-beauty/sleeping-beauty-first-colour.webp"
              data-large="images/large/sleeping-beauty/sleeping-beauty-first-colour.webp"
              alt="Backdrop with first colors applied, some areas still unpainted, photographed from above in the studio"
              width="800"
              height="800"
            />
            <article>
              <h2 id="painting_stage_title1"></h2>
              <p id="painting_stage_text1"></p>
            </article>
          </li>

          <li class="insights-item">
            <article>
              <h2 id="painting_stage_title2"></h2>
              <p id="painting_stage_text2"></p>
            </article>

            <img
              src="images/small/sleeping-beauty/sleeping-beauty-finished.webp"
              data-large="images/large/sleeping-beauty/sleeping-beauty-finished.webp"
              alt="Scenic artist applying final touches with a spray gun, parts of the finished backdrop masked with paper"
              width="800"
              height="800"
            />
          </li>

          <li class="insights-item text-first">
            <img
              src="images/small/sleeping-beauty/sleeping-beauty-detail2.webp"
              data-large="images/large/sleeping-beauty/sleeping-beauty-detail2.webp"
              alt="Detail of a finished palace backdrop showing a decorative frieze with ornaments"
              width="800"
              height="800"
            />
            <article>
              <h2 id="highlights_title"></h2>
              <p id="highlights_text"></p>
            </article>
          </li>
        </ul>
      </section>

      <dialog id="lightbox">
        <button class="lightbox-close">✕</button>
        <button class="lightbox-prev">‹</button>
        <button class="lightbox-next">›</button>
        <img id="lightbox-img" src="" alt="" />
      </dialog>
    </main>

    <footer></footer>
  </body>
</html>
