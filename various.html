<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
  <script src="js/i18n.js" defer></script>
  <script src="js/dark-mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <title>Anka Hilbert - Scenic Artist</title>
</head>

<body>
  <header></header>

  <main id="main">
    <article class="gallery-text-subpage">
      <h1 data-i18n="various_title"></h1>
      <p data-i18n="various_intro"></p>
    </article>

    <ul id="gallery">

      <li>
        <figure class="credited-img">
          <img src="images/small/various/80days03.webp" srcset="images/small/various/80days03-400.webp 400w,
            images/small/various/80days03-800.webp 800w"
            sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
            data-large="images/large/various/80days03.webp" data-credit="© Lutz Edelhoff"
            alt="Theatrical performance with actors on stage and a city-like set featuring Chinese neon signage."
            width="800" height="800" />
          <figcaption>© Lutz Edelhoff</figcaption>
        </figure>
      </li>
      <li>
        <img src="images/small/various/80days01.webp" srcset="images/small/various/80days01-400.webp 400w,
          images/small/various/80days01-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/80days01.webp"
          alt="View of a theater paint studio where a stage set with Chinese neon signs is being painted" width="800"
          height="800" />
      </li>
      <li>
        <img src="images/small/various/80days02.webp" srcset="images/small/various/80days02-400.webp 400w,
          images/small/various/80days02-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/80days02.webp" alt="Overhead view of a stage set with Chinese neon signage"
          width="800" height="800" />
      </li>

      <li>
        <figure class="credited-img">
          <img src="images/small/various/sweenytodd.webp" srcset="images/small/various/sweenytodd-400.webp 400w,
            images/small/various/sweenytodd-800.webp 800w"
            sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
            data-large="images/large/various/sweenytodd.webp" data-credit="© Lutz Edelhoff"
            alt="Opera performance with singers and a backdrop showing a barber shop advertisement." width="800"
            height="800" />
          <figcaption>© Lutz Edelhoff</figcaption>
        </figure>
      </li>

      <li>
        <img src="images/small/various/snowy-landscape.webp" srcset="images/small/various/snowy-landscape-400.webp 400w,
          images/small/various/snowy-landscape-800.webp 800w,
          images/small/various/snowy-landscape-1600.webp 1600w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/snowy-landscape.webp"
          alt="Theatrical backdrop of a snowy landscape with flying birds and small figures walking and skiing."
          width="800" height="800" />
      </li>

      <li>
        <img src="images/small/various/holofernes.webp" srcset="images/small/various/holofernes-400.webp 400w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/holofernes.webp" alt="Painted reproduction of Judith Beheading Holofernes."
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/various/jungle01.webp" srcset="images/small/various/jungle01-400.webp 400w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/jungle01.webp"
          alt="Overhead view of a paint studio showing a stage backdrop with a jungle scene." width="800"
          height="800" />
      </li>
      <li>
        <img src="images/small/various/jungle02.webp" srcset="images/small/various/jungle02-400.webp 400w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/jungle02.webp" alt="Jungle-themed stage backdrop" width="800" height="800" />
      </li>
      <li>
        <figure class="credited-img">
          <img src="images/small/various/manon.webp" srcset="images/small/various/manon-400.webp 400w,
            images/small/various/manon-800.webp 800w"
            sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
            data-large="images/large/various/manon.webp" data-credit="© Lutz Edelhoff"
            alt="Stage view of an opera with singers and a circular backdrop showing an abstract face made of geometric shapes"
            width="800" height="800" />
          <figcaption>© Lutz Edelhoff</figcaption>
        </figure>
      </li>


      <li>
        <img src="images/small/various/socialist.webp" data-large="images/large/various/socialist.webp"
          alt="Stage backdrop painted in a socialist realist style." width="800" height="800" />
      </li>

      <li>
        <img src="images/small/various/shark.webp" srcset="images/small/various/shark-400.webp 400w,
          images/small/various/shark-800.webp 800w,
          images/small/various/shark-1600.webp 1600w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/various/shark.webp"
          alt="Painting with two identical sharks swimming in opposite directions, viewed from above." width="800"
          height="800" />
      </li>
    </ul>

    <dialog id="lightbox">
      <button class="lightbox-close">✕</button>
      <button class="lightbox-prev">‹</button>
      <button class="lightbox-next">›</button>
      <figure>
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-credit"></figcaption>
      </figure>
    </dialog>
  </main>

  <footer></footer>
</body>

</html>
