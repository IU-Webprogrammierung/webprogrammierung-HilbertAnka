<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main id="main">
      <article class="gallery-text-subpage">
        <h1 id="sleeping_beauty_title_1"></h1>
        <p id="sleeping_beauty_intro_1"></p>
        <p id="sleeping_beauty_intro_2"></p>
      </article>

      <ul id="gallery">
        <li>
          <figure class="credited-img">
            <img
              src="images/small/sleeping-beauty/lutz.webp"
              data-large="images/large/sleeping-beauty/lutz.webp"
              data-credit="© Lutz Edelhoff"
              alt="Performance shot of Sleeping Beauty, ballet dancers in front of the palace set, scene 1"
              width="800"
              height="800"
            />
            <figcaption>© Lutz Edelhoff</figcaption>
          </figure>
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-sketch1.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-sketch1.webp"
            alt="Scenic artist working on the grid transfer sketch of a palace interior backdrop in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-sketch-detail.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-sketch-detail.webp"
            alt="Detail of a sketch showing two male figures carrying the architecture"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-first-colour.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-first-colour.webp"
            alt="Palace backdrop in early stage with sky and gold elements such as columns, capitals and baseboards blocked in"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-intermediate-status3.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-intermediate-status3.webp"
            alt="Scenic artist painting a palace interior backdrop, sky, columns and marble areas blocked in with first colors"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-intermediate-status.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-intermediate-status.webp"
            alt="Palace backdrop with marble areas blocked in and gold elements shaded to create depth"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-intermediate-status2.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-intermediate-status2.webp"
            alt="Scenic artist painting rose garlands around the columns on the nearly finished palace backdrop"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-finished1.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-finished1.webp"
            alt="Backdrop depicting a grand palace interior photographed from above in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-finished.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-finished.webp"
            alt="Scenic artist applying final touches with a spray gun, parts of the finished backdrop masked with paper"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/architecture/sleeping-beauty1.webp"
            data-large="images/large/architecture/sleeping-beauty1.webp"
            alt="Backdrop depicting a grand palace interior with columns, ornaments, gold and marble details, opening to a sky in the background"
            width="800"
            height="800"
          />
        </li>

        <li>
          <figure class="credited-img">
            <img
              src="images/small/sleeping-beauty/lutz3.webp"
              data-large="images/large/sleeping-beauty/lutz3.webp"
              data-credit="© Lutz Edelhoff"
              alt="Performance shot of Sleeping Beauty, ballet dancers in front of the palace set, scene 2"
              width="800"
              height="800"
            />
            <figcaption>© Lutz Edelhoff</figcaption>
          </figure>
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-detail.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-detail.webp"
            alt="Detail of a finished palace backdrop showing a Corinthian capital with ornamental decoration"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-detail2.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-detail2.webp"
            alt="Detail of a finished palace backdrop showing a decorative frieze with ornaments"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-detail4.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-detail4.webp"
            alt="Detail of a finished palace backdrop showing two male figures carrying the architecture, surrounded by ornaments"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-detail5.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-detail5.webp"
            alt="Detail of a finished palace backdrop showing a female figure standing on a pillar at the end of a staircase"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-side-wing.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-side-wing.webp"
            alt="Detail of a finished part of a side wing showing a decorative frieze with various ornaments"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-side-wing1.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-side-wing1.webp"
            alt="Finished side wing elements photographed from above in the studio, featuring various columns for the palace set"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-curtain.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-curtain.webp"
            alt="Studio photographed from above, side wing element in sketch stage on the left, main valance with first red colors applied on the right"
          />
        </li>

        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-curtain-finished.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-curtain-finished.webp"
            alt="Finished main valance painted in red, photographed from above in the studio"
          />
        </li>
        <li>
          <img
            src="images/small/sleeping-beauty/sleeping-beauty-curtain-detail2.webp"
            data-large="images/large/sleeping-beauty/sleeping-beauty-curtain-detail2.webp"
            alt="Detail of the finished main valance painted in red with golden yellow fringe"
          />
        </li>

        <li>
          <figure class="credited-img">
            <img
              src="images/small/sleeping-beauty/lutz2.webp"
              data-large="images/large/sleeping-beauty/lutz2.webp"
              data-credit="© Lutz Edelhoff"
              alt="Performance shot of Sleeping Beauty, ballet dancers in front of the palace set, scene 3"
            />
            <figcaption>© Lutz Edelhoff</figcaption>
          </figure>
        </li>
      </ul>

      <dialog id="lightbox">
        <button class="lightbox-close">✕</button>
        <button class="lightbox-prev">‹</button>
        <button class="lightbox-next">›</button>
        <figure>
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-credit"></figcaption>
        </figure>
      </dialog>
    </main>

    <footer></footer>
  </body>
</html>
