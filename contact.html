<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
  <script src="js/i18n.js" defer></script>
  <script src="js/dark-mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <title>Anka Hilbert - Scenic Artist</title>
</head>

<body>
  <header></header>

  <main id="main">
    <section class="contact-section">
      <article class="contact-text">
        <h1 data-i18n="contact_title"></h1>
        <p data-i18n="contact_intro1"></p>
        <p data-i18n="contact_intro2"></p>
      </article>

      <section id="contact-form-section">
        <form class="contact-form" id="contact-form">
          <fieldset>
            <label for="first-name" data-i18n="label_first_name"></label>
            <input type="text" id="first-name" name="first-name" required />

            <label for="last-name" data-i18n="label_last_name"></label>
            <input type="text" id="last-name" name="last-name" required />

            <label for="email" data-i18n="label_email"></label>
            <input type="email" id="email" name="email" required />

            <label for="message" data-i18n="label_message"></label>
            <textarea id="message" name="message" rows="8" required></textarea>

            <button type="submit" data-i18n="contact_button"></button>
          </fieldset>
        </form>
      </section>
    </section>
  </main>



  <footer></footer>
</body>

</html>
