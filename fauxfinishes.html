<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
  <script src="js/i18n.js" defer></script>
  <script src="js/dark-mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <title>Anka Hilbert - Scenic Artist</title>
</head>

<body>
  <header></header>

  <main id="main">
    <article class="gallery-text-subpage">
      <h1 data-i18n="faux_finishes_title"></h1>
      <p data-i18n="faux_finishes_intro"></p>
    </article>

    <ul id="gallery">
      <li>
        <img src="images/small/faux-finishes/wood.webp" data-large="images/large/faux-finishes/wood.webp"
          alt="Theatrical painting imitating dark wood grain, close-up detail" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/faux-finishes/wood1.webp" data-large="images/large/faux-finishes/wood1.webp"
          alt="Two small dressers painted with dark wood imitation in the studio" width="800" height="800" />
      </li>

      <li>
        <img src="images/small/faux-finishes/momus.webp" data-large="images/large/faux-finishes/momus.webp"
          alt="Shipping container converted into a bar, lettered MOMUS, painted to look weathered and distressed in blue and silver"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/faux-finishes/rust2.webp" data-large="images/large/faux-finishes/rust2.webp"
          alt="Letter 'E' painted green with heavy patina and rust effects" width="800" height="800" />
      </li>
      <li>
        <img src="images/small/faux-finishes/concrete1.webp" data-large="images/large/faux-finishes/concrete1.webp"
          alt="Large decorative curved elements painted to imitate concrete, in the studio" width="800" height="800" />
      </li>
      <li>
        <figure class="credited-img">
          <img src="images/small/faux-finishes/concrete.webp" data-large="images/large/faux-finishes/concrete.webp"
            data-credit="© Lutz Edelhoff"
            alt="Performance shot of Elektra, singer on stage with concrete imitation set resembling an underground tunnel"
            width="800" height="800" />
          <figcaption>© Lutz Edelhoff</figcaption>
        </figure>
      </li>

      <li>
        <figure class="credited-img">
          <img src="images/small/faux-finishes/peter_grimes.webp"
            data-large="images/large/faux-finishes/peter_grimes.webp" data-credit="© Lutz Edelhoff"
            alt="Performance shot of Peter Grimes, two figures in front of a small hut painted to look heavily weathered and distressed"
            width="800" height="800" />
          <figcaption>© Lutz Edelhoff</figcaption>
        </figure>
      </li>
      <li>
        <img src="images/small/faux-finishes/marble.webp" data-large="images/large/faux-finishes/marble.webp"
          alt="Wall of panels imitating white and grey marble, each containing a mask, also a large mask in the foreground"
          width="800" height="800" />
      </li>

      <li>
        <img src="images/small/faux-finishes/barrel.webp" data-large="images/large/faux-finishes/barrel.webp"
          alt="Old fire barrel painted in silver with heavily distressed and rusted surface" width="800" height="800" />
      </li>
    </ul>
  </main>

  <dialog id="lightbox">
    <button class="lightbox-close">✕</button>
    <button class="lightbox-prev">‹</button>
    <button class="lightbox-next">›</button>
    <figure>
      <img id="lightbox-img" src="" alt="" />
      <figcaption id="lightbox-credit"></figcaption>
    </figure>
  </dialog>

  <footer></footer>
</body>

</html>
