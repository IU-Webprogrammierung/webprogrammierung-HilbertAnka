<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
  <script src="js/i18n.js" defer></script>
  <script src="js/dark-mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <title>Anka Hilbert - Scenic Artist</title>
</head>

<body>
  <header></header>

  <main id="main">
    <article class="gallery-text-subpage">
      <h1 data-i18n="graduation_project_title"></h1>
      <p data-i18n="graduation_project_intro"></p>
    </article>

    <ul id="gallery">
      <li>
        <img src="images/small/graduation-project/diploma.webp" srcset="images/small/graduation-project/diploma-400.webp 400w,
          images/small/graduation-project/diploma-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma.webp"
          alt="Theatrical painting of a view from the stage into an abandoned ornate theater, framed by curtains"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/graduation-project/diploma-sketch.webp" srcset="images/small/graduation-project/diploma-sketch-400.webp 400w,
          images/small/graduation-project/diploma-sketch-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma-sketch.webp"
          alt="Theatrical painting in progress, charcoal sketch on canvas photographed from above in the studio"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/graduation-project/diploma-inking.webp" srcset="images/small/graduation-project/diploma-inking-400.webp 400w,
          images/small/graduation-project/diploma-inking-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma-inking.webp"
          alt="Theatrical painting in progress, inking begun on the left curtain, photographed from above in the studio"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/graduation-project/diploma-inking-finish.webp" srcset="images/small/graduation-project/diploma-inking-finish-400.webp 400w,
          images/small/graduation-project/diploma-inking-finish-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma-inking-finish.webp"
          alt="Theatrical painting in progress, inking completed, photographed from above in the studio" width="800"
          height="800" />
      </li>
      <li>
        <img src="images/small/graduation-project/diploma-first-colour.webp" srcset="images/small/graduation-project/diploma-first-colour-400.webp 400w,
          images/small/graduation-project/diploma-first-colour-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma-first-colour.webp"
          alt="Theatrical painting in progress, first colors applied, with a paint cart and color pots visible, photographed from above in the studio"
          width="800" height="800" />
      </li>
      <li>
        <img src="images/small/graduation-project/diploma-colour.webp" srcset="images/small/graduation-project/diploma-colour-400.webp 400w,
          images/small/graduation-project/diploma-colour-800.webp 800w"
          sizes="(max-width: 767px) calc(100vw - 100px), (max-width: 1024px) calc(50vw - 60px), calc(33vw - 60px)"
          data-large="images/large/graduation-project/diploma-colour.webp"
          alt="Theatrical painting in progress, colors further developed, photographed from above in the studio"
          width="800" height="800" />
      </li>
    </ul>

    <dialog id="lightbox">
      <button class="lightbox-close">✕</button>
      <button class="lightbox-prev">‹</button>
      <button class="lightbox-next">›</button>
      <figure>
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-credit"></figcaption>
      </figure>
    </dialog>
  </main>

  <footer></footer>
</body>

</html>
