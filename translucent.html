<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="fonts/montserrat-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/dancing-script-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/dancing-script-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="js/main.js" defer></script>
    <script src="js/i18n.js" defer></script>

    <title>Anka Hilbert - Scenic Artist</title>
  </head>
  <body>
    <header></header>

    <main>
      <article class="gallery-text-subpage">
        <h1 id="translucent_title"></h1>
        <p id="translucent_intro"></p>
      </article>

      <ul id="gallery">
        <li>
          <img
            src="images/small/translucent/cavepainting.webp"
            data-large="images/large/translucent/cavepainting.webp"
            alt="Painting on opera foil depicting a cave with two hand silhouettes"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/cavepainting2.webp"
            data-large="images/large/translucent/cavepainting2.webp"
            alt="Painting on opera foil depicting a cave with smaller hand silhouettes"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/practical-works/scrim.webp"
            data-large="images/large/practical-works/scrim.webp"
            alt="Theatrical painting of an Indian railway platform at sunset with figures, one reading a newspaper, another carrying luggage on their head"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller05.webp"
            data-large="images/large/translucent/luisa-miller05.webp"
            alt="Performance shot of Luisa Miller, two figures on stage with perspectival wing walls in muted green tones"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller-sketch.webp"
            data-large="images/large/translucent/luisa-miller-sketch.webp"
            alt="Wing walls photographed from above in the studio, charcoal sketch and inking completed"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller01.webp"
            data-large="images/large/translucent/luisa-miller01.webp"
            alt="Backdrop for Luisa Miller photographed from above, painted to match the wing walls in muted green distressed tones"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller03.webp"
            data-large="images/large/translucent/luisa-miller03.webp"
            alt="Performance shot of Luisa Miller, stage set with converging wing walls and two green armchairs on either side"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller02.webp"
            data-large="images/large/translucent/luisa-miller02.webp"
            alt="Two finished wing walls for Luisa Miller photographed from above in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/luisa-miller04.webp"
            data-large="images/large/translucent/luisa-miller04.webp"
            alt="Performance shot of Luisa Miller, three figures on stage with wing walls lit from behind creating a transparency effect"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/'staatstheater'-bonn1.webp"
            data-large="images/large/translucent/'staatstheater'-bonn1.webp"
            alt="Several square panels on opera foil painted in abstract blue tones imitating a water surface, photographed from above in the studio"
            width="800"
            height="800"
          />
        </li>

        <li>
          <img
            src="images/small/translucent/'staatstheater'-bonn2.webp"
            data-large="images/large/translucent/'staatstheater'-bonn2.webp"
            alt="Square panels on opera foil painted in abstract blue tones imitating a water surface, seen from closer"
            width="800"
            height="800"
          />
        </li>
      </ul>

      <dialog id="lightbox">
        <button class="lightbox-close">✕</button>
        <button class="lightbox-prev">‹</button>
        <button class="lightbox-next">›</button>
        <img id="lightbox-img" src="" alt="" />
      </dialog>
    </main>

    <footer></footer>
  </body>
</html>
